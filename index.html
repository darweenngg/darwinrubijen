<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darwin & Rubijen | December 10, 2027</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f8f8f8;
  --text: #1a1a1a;
  --accent: #8c8c8c;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}

section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
  text-align: center;
}

.container {
  max-width: 700px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  font-weight: 600;
  margin-bottom: 10px;
}

h2 {
  font-weight: 400;
  font-size: 1.2rem;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 40px;
}

.details {
  margin-top: 30px;
  font-size: 1rem;
  color: #444;
}

.button {
  display: inline-block;
  margin-top: 30px;
  padding: 12px 28px;
  border: 1px solid var(--text);
  text-decoration: none;
  color: var(--text);
  font-size: 0.9rem;
  letter-spacing: 1px;
  transition: 0.3s ease;
}

.button:hover {
  background: var(--text);
  color: white;
}

footer {
  padding: 20px;
  font-size: 0.8rem;
  color: var(--accent);
}
</style>
</head>

<body>

<section>
  <div class="container">
    <h1>Darwin & Rubijen</h1>
    <h2>ARE GETTING MARRIED</h2>

    <div class="details">
      <p>December 10, 2027</p>
      <p>Baguio City</p>
    </div>

    <a class="button" href="https://forms.gle/" target="_blank">
      RSVP
    </a>
  </div>
</section>

<footer>
  With love, we invite you to celebrate our special day.
</footer>

</body>
</html>
